<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <!-- BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">

</head>

<body>
    
    <div class="container bg-white mt-5">

        <div class="p-3 text-white bg-info header">
            
            <h2 class="text-center">CINE SOPHIA TICKETS</span></h2>

        </div>

        <div class="p-5 container-fluid">
        
            <h5 class="text-secondary"><b>Student Details</b></h5>

            <label>FULL NAME:</label>
            <input type="textbox" class="form-control" placeholder="Juan Dela Cruz"><br><br>

            <h5 class="text-secondary"><b>Ticket Selection</b></h5>

            <label>QUANTITY:</label>
            <input type="number" class="form-control" value="0" min="0" id="quanNum"><br><br>

            <h5 class="text-secondary"><b>Payment Details</b></h5>

            <label>SUBTOTAL:</label>
            <input type="number" class="form-control" value="0.00" readonly><br>

            <label>ADMIN FEE:</label>
            <input type="number" class="form-control" value="50.00" readonly><br>

            <label>TOTAL:</label>
            <input type="number" class="form-control" id="final_Total" readonly><br><br>

            <div class="text-center">
                <button type="button" class="btn btn-info" onclick="register()">Complete Registration</button>
                <button type="button" class="btn btn-dark" onclick="window.location.reload()">Reset</button>
            </div>
        
        </div>

    </div>
        
    <script src="main.js"></script>

</body>
</html>
